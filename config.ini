[MODEL]

# Model specifications
model=meta-llama/Llama-3.1-8B-Instruct
model_weights=outputs/
model_context_tokens=2048
min_chunk_tokens=700
target_chunk_tokens=1100
max_chunk_tokens=1400
reserved_output_tokens=400
safety_margin_tokens=96

[DATASET]

# Dataset generation
test_ratio=0.15
empty_ratio=1.0
k_folds=5
seed=42

[PATHS]

# Data directories (main.py)
input_pdf_dir=data/raw
raw_markdown_dir=data/processed/raw_markdown
clean_markdown_dir=data/processed/clean_markdown
divided_markdown_dir=data/processed/divided_markdown
extracted_events_dir=data/results/extracted_events
scored_events_dir=data/results/scored_events

# Data directories and paths (dev.py)

## Event scoring (also uses divided_markdown_dir)
raw_labels_dir=data/labels/raw
scored_labels_dir=data/labels/scored

## Dataset generation (also uses scored_labels_dir)
dataset_dir=data/dataset

## Evaluation analysis
split_info_path=data/dataset/split_info.json
eval_preds_path=data/eval/eval_preds.jsonl
eval_analysis_path=data/eval/eval_analysis.txt
full_eval_analysis_dir=data/eval/full_analysis

## Token checking
train_file_path=data/dataset/train.jsonl
test_file_path=data/dataset/test.jsonl
